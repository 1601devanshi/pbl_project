<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Routing System + CSS 3D View</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
    .map-3d {
        transform: perspective(800px) rotateX(55deg);
        transform-style: preserve-3d;
        border-radius: 12px;
        height: 400px;
        width: 100%;
        background: #d9d9d9;
        position: relative;
        overflow: hidden;
    }

    .node-3d {
        width: 14px;
        height: 14px;
        background: #333;
        border-radius: 50%;
        position: absolute;
        transform: translate(-50%, -50%);
    }

    .edge-3d {
        position: absolute;
        background: #aaa;
        transform-origin: 0 0;
        height: 3px;
    }

    .car-3d {
        width: 20px;
        height: 12px;
        background: #ff4d4d;
        border-radius: 4px;
        position: absolute;
        transform: translate(-50%, -50%);
    }
</style>

</head>

<body class="bg-gray-900 text-white p-6">

<h1 class="text-3xl font-bold text-center mb-6">
    🚗 Adaptive Routing System (GA + CSS 3D)
</h1>

<div class="grid grid-cols-1 md:grid-cols-3 gap-6">

<!-- LEFT PANEL -->
<div class="bg-gray-800 p-5 rounded-xl space-y-4">

    <h2 class="text-xl font-semibold">Generate Graph</h2>
    <input id="nodeCount" type="number" placeholder="Number of Nodes (5–15)" class="w-full p-2 rounded bg-gray-700">

    <button onclick="generateGraph()" class="w-full bg-blue-600 hover:bg-blue-700 p-2 rounded">Generate Graph</button>

    <h2 class="text-xl font-semibold mt-4">Weather</h2>
    <select id="weatherSelect" class="w-full p-2 rounded bg-gray-700">
        <option value="1">Clear</option>
        <option value="1.3">Rain</option>
        <option value="1.5">Fog</option>
    </select>

    <h2 class="text-xl font-semibold mt-4">Time of Day</h2>
    <select id="peakSelect" class="w-full p-2 rounded bg-gray-700">
        <option value="1">Normal</option>
        <option value="1.4">Morning Peak</option>
        <option value="1.3">Evening Peak</option>
        <option value="0.8">Night</option>
    </select>

    <h2 class="text-xl font-semibold mt-4">Optimize Mode</h2>
    <select id="optMode" class="w-full p-2 rounded bg-gray-700">
        <option value="time">Fastest</option>
        <option value="fuel">Fuel</option>
        <option value="balanced">Balanced</option>
    </select>

    <h2 class="text-xl font-semibold mt-4">Find Route</h2>

    <select id="sourceNode" class="w-full p-2 rounded bg-gray-700"></select>
    <select id="destNode" class="w-full p-2 rounded bg-gray-700"></select>

    <button onclick="runGA()" class="w-full bg-purple-600 hover:bg-purple-700 p-2 rounded">Run GA</button>

    <div id="result" class="mt-4 text-lg"></div>
</div>

<!-- 2D CANVAS -->
<div class="md:col-span-2 bg-gray-800 p-5 rounded-xl">
    <canvas id="graphCanvas" width="900" height="400"></canvas>
</div>

</div>

<!-- 3D CSS VIEW -->
<h2 class="text-2xl font-bold mt-10 mb-4 text-center">🌐 Minimal CSS-3D Vehicle View</h2>

<div class="bg-gray-800 p-5 rounded-xl">
    <div id="map3D" class="map-3d"></div>
</div>


<script>
// ------------------ Graph Data -------------------
let nodes = {};
let edges = {};
let canvas = document.getElementById("graphCanvas");
let ctx = canvas.getContext("2d");

// ------------------ Generate Graph -------------------
function generateGraph() {
    let n = Number(document.getElementById("nodeCount").value);
    if (n < 5 || n > 15) return alert("Enter 5–15 nodes");

    nodes = {};
    edges = {};

    for (let i = 0; i < n; i++) {
        nodes[String.fromCharCode(65 + i)] = {
            x: Math.random() * 850 + 25,
            y: Math.random() * 350 + 25
        };
    }

    Object.keys(nodes).forEach(a => {
        edges[a] = {};
        Object.keys(nodes).forEach(b => {
            if (a !== b && Math.random() < 0.3) {
                edges[a][b] = Math.floor(Math.random() * 40 + 20);
            }
        });
    });

    fillSelectors();
    drawGraph();
    update3D();
}

function fillSelectors() {
    let s = document.getElementById("sourceNode");
    let d = document.getElementById("destNode");
    s.innerHTML = "";
    d.innerHTML = "";
    Object.keys(nodes).forEach(n => {
        s.innerHTML += `<option>${n}</option>`;
        d.innerHTML += `<option>${n}</option>`;
    });
}

// ------------------ Draw 2D Graph -------------------
function drawGraph() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // edges
    for (let a in edges) {
        for (let b in edges[a]) {
            ctx.beginPath();
            ctx.strokeStyle = "#aaa";
            ctx.moveTo(nodes[a].x, nodes[a].y);
            ctx.lineTo(nodes[b].x, nodes[b].y);
            ctx.stroke();
        }
    }

    // nodes
    for (let n in nodes) {
        ctx.beginPath();
        ctx.fillStyle = "#fff";
        ctx.arc(nodes[n].x, nodes[n].y, 8, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "yellow";
        ctx.fillText(n, nodes[n].x + 10, nodes[n].y);
    }
}

// ------------------ Fake GA for Demo -------------------
function runGA() {
    let keys = Object.keys(nodes);
    let path = [keys[0], keys[2], keys[4] || keys[1]];

    document.getElementById("result").innerHTML =
        `<b>Best Path:</b> ${path.join(" → ")}`;

    animateCar(path);
    highlightPath(path);
}

// 2D highlight
function highlightPath(p) {
    drawGraph();
    ctx.strokeStyle = "red";
    ctx.lineWidth = 3;

    ctx.beginPath();
    ctx.moveTo(nodes[p[0]].x, nodes[p[0]].y);
    for (let i = 1; i < p.length; i++)
        ctx.lineTo(nodes[p[i]].x, nodes[p[i]].y);
    ctx.stroke();

    ctx.lineWidth = 1;
}

// ---------------- CSS 3D View -------------------
function update3D() {
    let div = document.getElementById("map3D");
    div.innerHTML = "";

    // draw edges
    for (let a in edges) {
        for (let b in edges[a]) {
            let x1 = nodes[a].x, y1 = nodes[a].y;
            let x2 = nodes[b].x, y2 = nodes[b].y;

            let dx = x2 - x1, dy = y2 - y1;
            let dist = Math.sqrt(dx * dy + dy * dy);

            let edge = document.createElement("div");
            edge.className = "edge-3d";

            edge.style.width = dist + "px";
            edge.style.left = x1 + "px";
            edge.style.top = y1 + "px";
            edge.style.transform = `rotate(${Math.atan2(dy, dx)}rad)`;

            div.appendChild(edge);
        }
    }

    // draw nodes
    for (let n in nodes) {
        let nodeEl = document.createElement("div");
        nodeEl.className = "node-3d";
        nodeEl.style.left = nodes[n].x + "px";
        nodeEl.style.top = nodes[n].y + "px";
        div.appendChild(nodeEl);
    }
}

// ---------------- Car Movement -------------------
function animateCar(path) {
    let div = document.getElementById("map3D");
    let car = document.createElement("div");
    car.className = "car-3d";
    div.appendChild(car);

    let i = 0;

    function move() {
        if (i >= path.length - 1) return;

        let A = nodes[path[i]];
        let B = nodes[path[i + 1]];

        let steps = 80, t = 0;

        let interval = setInterval(() => {
            let x = A.x + (B.x - A.x) * (t / steps);
            let y = A.y + (B.y - A.y) * (t / steps);

            car.style.left = x + "px";
            car.style.top = y + "px";

            t++;
            if (t > steps) {
                clearInterval(interval);
                i++;
                move();
            }
        }, 20);
    }
    move();
}

</script>
</body>
</html>
